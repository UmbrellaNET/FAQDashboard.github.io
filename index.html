	<style>
		/* ── Toast Notification System ── */
		#toast-container {
			position: fixed;
			top: 20px;
			right: 20px;
			z-index: 99999;
			display: flex;
			flex-direction: column;
			gap: 10px;
			pointer-events: none;
		}

		.toast {
			display: flex;
			align-items: flex-start;
			gap: 12px;
			min-width: 320px;
			max-width: 400px;
			padding: 14px 16px;
			border-radius: 12px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12), 0 2px 8px rgba(0, 0, 0, 0.08);
			background: #fff;
			pointer-events: all;
			cursor: pointer;
			/* Slide in from right */
			animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
			border-left: 4px solid transparent;
			position: relative;
			overflow: hidden;
		}

		.toast.removing {
			animation: toastOut 0.3s ease-in forwards;
		}

		/* Progress bar */
		.toast::after {
			content: '';
			position: absolute;
			bottom: 0;
			left: 0;
			height: 3px;
			background: currentColor;
			opacity: 0.25;
			width: 100%;
			animation: toastProgress var(--duration, 5s) linear forwards;
			transform-origin: left;
		}

		/* Variants */
		.toast.toast-error {
			border-left-color: #e53e3e;
			color: #e53e3e;
		}
		.toast.toast-error .toast-icon-wrap {
			background: #fff5f5;
			color: #e53e3e;
		}

		.toast.toast-success {
			border-left-color: #38a169;
			color: #38a169;
		}
		.toast.toast-success .toast-icon-wrap {
			background: #f0fff4;
			color: #38a169;
		}

		.toast.toast-info {
			border-left-color: #3182ce;
			color: #3182ce;
		}
		.toast.toast-info .toast-icon-wrap {
			background: #ebf8ff;
			color: #3182ce;
		}

		.toast.toast-warning {
			border-left-color: #d69e2e;
			color: #d69e2e;
		}
		.toast.toast-warning .toast-icon-wrap {
			background: #fffff0;
			color: #d69e2e;
		}

		.toast-icon-wrap {
			flex-shrink: 0;
			width: 36px;
			height: 36px;
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 16px;
		}

		.toast-body {
			flex: 1;
			min-width: 0;
		}

		.toast-title {
			font-family: 'Inter', sans-serif;
			font-weight: 600;
			font-size: 14px;
			color: #1a202c;
			margin-bottom: 2px;
			line-height: 1.3;
		}

		.toast-message {
			font-family: 'Inter', sans-serif;
			font-size: 13px;
			color: #4a5568;
			line-height: 1.4;
		}

		.toast-close {
			flex-shrink: 0;
			background: none;
			border: none;
			color: #a0aec0;
			cursor: pointer;
			padding: 2px;
			font-size: 14px;
			line-height: 1;
			transition: color 0.15s;
			margin-top: 1px;
		}
		.toast-close:hover {
			color: #718096;
		}

		@keyframes toastIn {
			from {
				opacity: 0;
				transform: translateX(50px) scale(0.95);
			}
			to {
				opacity: 1;
				transform: translateX(0) scale(1);
			}
		}

		@keyframes toastOut {
			from {
				opacity: 1;
				transform: translateX(0) scale(1);
				max-height: 100px;
				margin-bottom: 0;
			}
			to {
				opacity: 0;
				transform: translateX(60px) scale(0.9);
				max-height: 0;
				margin-bottom: -10px;
				padding-top: 0;
				padding-bottom: 0;
			}
		}

		@keyframes toastProgress {
			from { transform: scaleX(1); }
			to   { transform: scaleX(0); }
		}

		/* Mobile adjustments */
		@media (max-width: 480px) {
			#toast-container {
				top: 12px;
				right: 12px;
				left: 12px;
			}
			.toast {
				min-width: unset;
				max-width: 100%;
			}
		}
	</style>
</head>
<body class="login-page">	
	
	<!-- Toast Notification Container -->
	<div id="toast-container"></div>

	<!-- js -->
	<script src="js/core.js"></script>
	<script src="js/script.min.js"></script>
	<script src="js/process.js"></script>
	<script src="js/layout-settings.js"></script>
	
	<script>
		/* ── Toast Notification API ── */
		const Toast = (() => {
			const ICONS = {
				error:   'fa-solid fa-circle-exclamation',
				success: 'fa-solid fa-circle-check',
				info:    'fa-solid fa-circle-info',
				warning: 'fa-solid fa-triangle-exclamation',
			};

			const TITLES = {
				error:   'Something went wrong',
				success: 'Success',
				info:    'Heads up',
				warning: 'Warning',
			};

			function show(message, type = 'info', duration = 5000) {
				const container = document.getElementById('toast-container');

				const toast = document.createElement('div');
				toast.className = `toast toast-${type}`;
				toast.style.setProperty('--duration', `${duration}ms`);

				toast.innerHTML = `
					<div class="toast-icon-wrap">
						<i class="${ICONS[type]}"></i>
					</div>
					<div class="toast-body">
						<div class="toast-title">${TITLES[type]}</div>
						<div class="toast-message">${message}</div>
					</div>
					<button class="toast-close" aria-label="Dismiss">
						<i class="fa-solid fa-xmark"></i>
					</button>
				`;

				function dismiss() {
					toast.classList.add('removing');
					toast.addEventListener('animationend', () => toast.remove(), { once: true });
				}

				toast.querySelector('.toast-close').addEventListener('click', dismiss);
				toast.addEventListener('click', dismiss);

				container.appendChild(toast);

				const timer = setTimeout(dismiss, duration);
				// Pause timer on hover
				toast.addEventListener('mouseenter', () => clearTimeout(timer));
				toast.addEventListener('mouseleave', () => setTimeout(dismiss, 1500));

				return toast;
			}

			return {
				error:   (msg, dur) => show(msg, 'error',   dur),
				success: (msg, dur) => show(msg, 'success', dur),
				info:    (msg, dur) => show(msg, 'info',    dur),
				warning: (msg, dur) => show(msg, 'warning', dur),
			};
		})();

		/* ── Map Firebase error codes to friendly messages ── */
		function getFriendlyError(code) {
			const map = {
				'auth/invalid-email':            'Please enter a valid email address.',
				'auth/user-disabled':            'This account has been disabled. Please contact support.',
				'auth/user-not-found':           'No account found with that email. Would you like to register?',
				'auth/wrong-password':           'Incorrect password. Please try again or reset your password.',
				'auth/invalid-credential':       'Invalid email or password. Please check your details and try again.',
				'auth/too-many-requests':        'Too many failed attempts. Please wait a moment before trying again.',
				'auth/network-request-failed':   'Network error. Please check your connection and try again.',
				'auth/popup-closed-by-user':     'Sign-in window was closed. Please try again.',
				'auth/popup-blocked':            'Pop-up was blocked by your browser. Please allow pop-ups for this site.',
				'auth/account-exists-with-different-credential':
				                                 'An account already exists with this email using a different sign-in method.',
				'auth/cancelled-popup-request':  'Only one sign-in window can be open at a time.',
				'auth/operation-not-allowed':    'This sign-in method is not enabled. Please contact support.',
				'auth/email-already-in-use':     'An account with this email already exists.',
				'auth/weak-password':            'Password should be at least 6 characters.',
				'auth/requires-recent-login':    'Please sign in again to complete this action.',
				'auth/timeout':                  'The request timed out. Please try again.',
			};
			return map[code] || 'An unexpected error occurred. Please try again.';
		}

		/* ── Auth Logic ── */
		document.addEventListener('DOMContentLoaded', function() {
			const loginForm    = document.getElementById('loginForm');
			const googleSignIn = document.getElementById('googleSignIn');
			const signInButton = document.getElementById('signInButton');

			firebase.auth().onAuthStateChanged((user) => {
				if (user) {
					console.log("User is logged in:", user.email);
				} else {
					console.log("No user is logged in");
				}
			});

			// Email / password login
			loginForm.addEventListener('submit', function(e) {
				e.preventDefault();
				const email    = document.getElementById('email').value.trim();
				const password = document.getElementById('password').value;

				if (!email || !password) {
					Toast.warning('Please enter both your email and password.');
					return;
				}

				signInButton.disabled = true;
				signInButton.value    = 'Signing in…';

				firebase.auth().signInWithEmailAndPassword(email, password)
					.then((userCredential) => {
						Toast.success('Welcome back! Redirecting you now…', 2500);
						setTimeout(() => { window.location.href = 'index2.html'; }, 1200);
					})
					.catch((error) => {
						Toast.error(getFriendlyError(error.code));
						signInButton.disabled = false;
						signInButton.value    = 'Sign In';
					});
			});

			// Google Sign-In
			googleSignIn.addEventListener('click', function() {
				googleSignIn.disabled    = true;
				googleSignIn.textContent = 'Signing in…';

				const provider = new firebase.auth.GoogleAuthProvider();

				firebase.auth().signInWithPopup(provider)
					.then((result) => {
						Toast.success('Signed in with Google! Redirecting…', 2500);
						setTimeout(() => { window.location.href = 'index2.html'; }, 1200);
					})
					.catch((error) => {
						Toast.error(getFriendlyError(error.code));
						googleSignIn.disabled    = false;
						googleSignIn.textContent = 'Continue with Google';
					});
			});
		});
	</script>
