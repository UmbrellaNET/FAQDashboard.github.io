<!DOCTYPE html>
<html>
<head>
	<!-- Basic Page Info -->
	<meta charset="utf-8">
	<title>Cake Fairy - Forgot Password</title>

	<!-- Site favicon -->
	<link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">

	<!-- Mobile Specific Metas -->
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

	<!-- Google Font -->
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
	<!-- CSS -->
	<link rel="stylesheet" type="text/css" href="css/core.css">
	<link rel="stylesheet" type="text/css" href="css/icon-font.min.css">
	<link rel="stylesheet" type="text/css" href="css/style.css">

	<!-- Font Awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

	<!-- Firebase SDK -->
	<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-auth-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-analytics-compat.js"></script>

	<!-- Global site tag (gtag.js) - Google Analytics -->
	<script async src="https://www.googletagmanager.com/gtag/js?id=UA-119386393-1"></script>
	<script>
		window.dataLayer = window.dataLayer || [];
		function gtag(){dataLayer.push(arguments);}
		gtag('js', new Date());
		gtag('config', 'UA-119386393-1');

		// Initialize Firebase
		const firebaseConfig = {
			apiKey: "AIzaSyD7WOCx2GPe9a4yv8GJtBZpGOXrJuSunS0",
			authDomain: "cake-fairy-2af2a.firebaseapp.com",
			projectId: "cake-fairy-2af2a",
			storageBucket: "cake-fairy-2af2a.firebasestorage.app",
			messagingSenderId: "348507031998",
			appId: "1:348507031998:web:9ba7692a1896ded2bf11ef",
			measurementId: "G-707D25MTZ3"
			};

		// Initialize Firebase
		firebase.initializeApp(firebaseConfig);
		firebase.analytics();
	</script>
</head>
<body>
	<div class="login-header box-shadow">
		<div class="container-fluid d-flex justify-content-between align-items-center">
			<div class="brand-logo">
				<a href="login.html">
					<img src="img/logo.png" alt="" style="margin-top:120px;">
				</a>
			</div>
			
		</div>
	</div>
	<div class="login-wrap d-flex align-items-center flex-wrap justify-content-center">
		<div class="container">
			<div class="row align-items-center">
				<div class="col-md-6">
					<img src="img/forgot-password.png" alt="">
				</div>
				<div class="col-md-6">
					<div class="login-box bg-white box-shadow border-radius-10">
						<div class="login-title">
							<h2 class="text-center text-primary">Forgot Password</h2>
						</div>
						<h6 class="mb-20">Enter your email address to reset your password</h6>
						<form id="forgotPasswordForm">
							<div class="input-group custom">
								<input type="email" class="form-control form-control-lg" id="email" placeholder="Email" required>
								<div class="input-group-append custom">
									<span class="input-group-text"><i class="fa fa-envelope-o" aria-hidden="true"></i></span>
								</div>
							</div>
							<div class="row align-items-center">
								<div class="col-5">
									<div class="input-group mb-0">
										<input class="btn btn-primary btn-lg btn-block" type="submit" value="Submit" id="submitButton">
									</div>
								</div>
								<div class="col-2">
									<div class="font-16 weight-600 text-center" data-color="#707373">OR</div>
								</div>
								<div class="col-5">
									<div class="input-group mb-0">
										<a class="btn btn-outline-primary btn-lg btn-block" href="login.html">Login</a>
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- success Popup html Start -->
	<button type="button" id="success-modal-btn" hidden data-toggle="modal" data-target="#success-modal" data-backdrop="static">Launch modal</button>
	<div class="modal fade" id="success-modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered max-width-400" role="document">
			<div class="modal-content">
				<div class="modal-body text-center font-18">
					<h3 class="mb-20">Reset Email Sent!</h3>
					<div class="mb-30 text-center"><img src="img/success.png"></div>
					We've sent a password reset link to your email address.
				</div>
				<div class="modal-footer justify-content-center">
					<button type="button" class="btn btn-primary" data-dismiss="modal">OK</button>
				</div>
			</div>
		</div>
	</div>
	<!-- success Popup html End -->
	<!-- js -->
	<script src="js/core.js"></script>
	<script src="js/script.min.js"></script>
	<script src="js/process.js"></script>
	<script src="js/layout-settings.js"></script>
	
	<!-- Firebase Auth Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const forgotPasswordForm = document.getElementById('forgotPasswordForm');
			const submitButton = document.getElementById('submitButton');
			const successModalBtn = document.getElementById('success-modal-btn');
			
			// Password reset form submission
			forgotPasswordForm.addEventListener('submit', function(e) {
				e.preventDefault();
				const email = document.getElementById('email').value;
				
				submitButton.disabled = true;
				submitButton.value = "Sending...";
				
				// Send password reset email
				firebase.auth().sendPasswordResetEmail(email)
					.then(() => {
						// Password reset email sent
						successModalBtn.click();
						submitButton.disabled = false;
						submitButton.value = "Submit";
					})
					.catch((error) => {
						// Handle errors
						const errorCode = error.code;
						const errorMessage = error.message;
						
						let friendlyMessage = "An error occurred. Please try again.";
						if (errorCode === "auth/user-not-found") {
							friendlyMessage = "No user found with this email address.";
						} else if (errorCode === "auth/invalid-email") {
							friendlyMessage = "Please enter a valid email address.";
						}
						
						alert(friendlyMessage);
						submitButton.disabled = false;
						submitButton.value = "Submit";
					});
			});
		});
	</script>
</body>
</html>
