<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>UmbrellaNet – Live Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1c1a2e;
            --primary: #5E185B;
            --accent: #CE3EC0;
            --secondary: #32c245;
            --muted: #2b2b44;
            --text: #f1e6f9;
            --card: #2a2740;
            --border: #333;
            --danger: #ff6464;
            --success-bg: rgba(9,241,40,0.08);
            --danger-bg: rgba(255,100,100,0.08);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
        }
 
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
 
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }
 
        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            background: var(--card);
            padding: 20px;
            height: 100vh;
            position: sticky;
            top: 0;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
 
        .brand {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }
 
        .logo-box {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }
 
        .brand h1 { font-size: 18px; color: #fff; }
        .brand small { font-size: 11px; color: #aaa; display: block; }
 
        .nav a {
            color: var(--text);
            text-decoration: none;
            padding: 10px 12px;
            border-radius: 8px;
            display: block;
            font-size: 14px;
        }
        .nav a:hover { background: var(--muted); }
        .nav a.active { background: var(--primary); color: white; }
 
        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
 
        .topbar {
            height: 60px;
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
 
        .topbar-title { font-size: 15px; font-weight: 600; }
 
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
 
        /* ── CHATS LAYOUT ── */
        .chats-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
 
        /* ── SESSION LIST PANEL ── */
        .session-panel {
            width: 300px;
            background: var(--card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
 
        .session-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
 
        .session-count {
            background: var(--accent);
            color: white;
            border-radius: 12px;
            padding: 2px 8px;
            font-size: 12px;
        }
 
        .refresh-btn {
            background: var(--muted);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 5px 10px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: border-color 0.2s;
        }
        .refresh-btn:hover { border-color: var(--accent); }
        .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
 
        .session-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
 
        .session-item {
            background: var(--muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .session-item:hover { border-color: var(--accent); background: rgba(206,62,192,0.06); }
        .session-item.active { border-color: var(--accent); background: rgba(206,62,192,0.1); }
 
        .session-key {
            font-family: monospace;
            font-size: 10px;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
 
        .session-preview {
            font-size: 12px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
 
        .session-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #666;
        }
 
        /* Skeleton loader */
        .skeleton {
            background: linear-gradient(90deg, var(--muted) 25%, rgba(255,255,255,0.04) 50%, var(--muted) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 8px;
            height: 72px;
        }
        @keyframes shimmer { to { background-position: -200% 0; } }
 
        /* ── CHAT VIEWER ── */
        .chat-viewer {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
 
        .chat-viewer-header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--card);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
 
        .chat-viewer-key {
            font-family: monospace;
            font-size: 11px;
            color: var(--accent);
            margin-bottom: 3px;
        }
 
        .chat-viewer-stats { font-size: 12px; color: #666; }
 
        .delete-btn {
            background: transparent;
            border: 1px solid rgba(255,100,100,0.35);
            border-radius: 8px;
            color: var(--danger);
            padding: 6px 14px;
            font-size: 12px;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .delete-btn:hover { background: var(--danger-bg); }
 
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
 
        /* Bubbles — same style as live-agent.html */
        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }
        .msg-row.model-row { flex-direction: row-reverse; align-self: flex-end; }
 
        .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700;
        }
        .avatar-bot  { background: linear-gradient(135deg, var(--primary), var(--accent)); }
        .avatar-user { background: var(--muted); border: 1px solid var(--border); }
 
        .bubble {
            max-width: 70%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .bubble-bot  { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        .bubble-user { background: var(--muted); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
 
        .msg-label {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #666;
            margin-bottom: 3px;
        }
        .msg-row.model-row .msg-label { text-align: right; }
 
        /* Empty / error states */
        .state-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #666;
            padding: 40px;
            text-align: center;
        }
        .state-center .icon { font-size: 44px; opacity: 0.35; }
        .state-center p { font-size: 14px; }
 
        .error-msg {
            margin: 12px;
            padding: 12px 16px;
            background: var(--danger-bg);
            border: 1px solid rgba(255,100,100,0.3);
            border-radius: 10px;
            font-size: 13px;
            color: var(--danger);
        }
 
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
 
        @media (max-width: 1000px) { .sidebar { display: none; } }
        @media (max-width: 650px)  { .session-panel { width: 220px; } .bubble { max-width: 85%; } }
    </style>
</head>
<body>
 
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="brand">
            <div class="logo-box">🌐</div>
            <div>
                <h1>UmbrellaNet</h1>
                <small>Live Support</small>
            </div>
        </div>
        <nav class="nav">
            <a href="chats.html" class="active">Chats</a>
            <a href="analytics.html">Analytics</a>
            <a href="index2.html">Dashboard</a>
            <a href="live-agent.html">🎧 Live Agent</a>
        </nav>
    </aside>
 
    <!-- MAIN -->
    <div class="main">
        <div class="topbar">
            <div class="topbar-title">💬 Chats</div>
        </div>
 
        <div class="chats-layout">
 
            <!-- Session list -->
            <div class="session-panel">
                <div class="session-header">
                    <span>Sessions <span class="session-count" id="session-count">—</span></span>
                    <button class="refresh-btn" id="refresh-btn" onclick="loadSessions()">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
                            <path d="M21 3v5h-5"/>
                            <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
                            <path d="M8 16H3v5"/>
                        </svg>
                        Refresh
                    </button>
                </div>
                <div class="session-list" id="session-list">
                    <div class="skeleton"></div>
                    <div class="skeleton" style="height:55px;opacity:.6;margin-top:2px"></div>
                    <div class="skeleton" style="height:65px;opacity:.4;margin-top:2px"></div>
                </div>
            </div>
 
            <!-- Chat viewer -->
            <div class="chat-viewer" id="chat-viewer">
                <div class="state-center">
                    <div class="icon">💬</div>
                    <p>Select a session from the list to view the conversation</p>
                </div>
            </div>
 
        </div>
    </div>
 
    <script>
        /* ══════════════════════════════════════════
           UPSTASH CONFIG
        ══════════════════════════════════════════ */
        const UPSTASH_URL   = 'https://quiet-snapper-78920.upstash.io';
        const UPSTASH_TOKEN = 'gQAAAAAAATRIAAIncDFmMTQwZm2yMTcyNDY@MWNkYmZk0GY@MDM3Mj1jODM3N3AxNzg5MjA';
        const KEY_PREFIX    = 'umbrellanet_chat_';
 
        const redisHeaders = {
            'Authorization': `Bearer ${UPSTASH_TOKEN}`,
            'Content-Type': 'application/json',
        };
 
        /* ══════════════════════════════════════════
           STATE
        ══════════════════════════════════════════ */
        let sessions  = [];
        let activeKey = null;
 
        /* ══════════════════════════════════════════
           PIPELINE HELPER
        ══════════════════════════════════════════ */
        async function redisPipeline(commands) {
            const resp = await fetch(`${UPSTASH_URL}/pipeline`, {
                method: 'POST',
                headers: redisHeaders,
                body: JSON.stringify(commands),
            });
            if (!resp.ok) throw new Error(`Redis HTTP ${resp.status}`);
            return resp.json();
        }
 
        /* ══════════════════════════════════════════
           LOAD ALL SESSIONS
        ══════════════════════════════════════════ */
        async function loadSessions() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('spinning');
            document.getElementById('session-list').innerHTML =
                '<div class="skeleton"></div>' +
                '<div class="skeleton" style="height:55px;opacity:.6;margin-top:2px"></div>' +
                '<div class="skeleton" style="height:65px;opacity:.4;margin-top:2px"></div>';
 
            try {
                // 1. SCAN for all keys with our prefix
                const scanResp = await redisPipeline([
                    ['SCAN', 0, 'MATCH', `${KEY_PREFIX}*`, 'COUNT', 500]
                ]);
                const scanResult = scanResp[0]?.result;
                let keys = [];
                if (Array.isArray(scanResult) && scanResult.length === 2) {
                    keys = scanResult[1] || [];
                }
 
                if (!keys.length) {
                    document.getElementById('session-list').innerHTML =
                        '<div class="state-center"><div class="icon">📭</div><p>No chat sessions found</p></div>';
                    document.getElementById('session-count').textContent = '0';
                    sessions = [];
                    return;
                }
 
                // 2. Fetch all turn lists in one pipeline call
                const lrangeResp = await redisPipeline(
                    keys.map(k => ['LRANGE', k, 0, -1])
                );
 
                // 3. Parse into session objects
                sessions = keys.map((key, i) => {
                    const raw   = lrangeResp[i]?.result || [];
                    const turns = raw.map(item => {
                        try { return JSON.parse(item); } catch { return null; }
                    }).filter(Boolean);
                    return { key, turns };
                })
                .filter(s => s.turns.length > 0)
                .sort((a, b) => b.turns.length - a.turns.length);
 
                document.getElementById('session-count').textContent = sessions.length;
                renderSessionList();
 
                // Restore active session highlight if still present
                if (activeKey && sessions.find(s => s.key === activeKey)) {
                    openSession(activeKey);
                }
 
            } catch (err) {
                console.error(err);
                document.getElementById('session-list').innerHTML =
                    `<div class="error-msg">⚠️ ${escHtml(err.message)}</div>`;
            } finally {
                btn.classList.remove('spinning');
            }
        }
 
        /* ══════════════════════════════════════════
           RENDER SESSION LIST
        ══════════════════════════════════════════ */
        function renderSessionList() {
            const list = document.getElementById('session-list');
            if (!sessions.length) {
                list.innerHTML = '<div class="state-center"><div class="icon">📭</div><p>No sessions</p></div>';
                return;
            }
            list.innerHTML = sessions.map(s => {
                const shortKey  = s.key.replace(KEY_PREFIX, '');
                const lastTurn  = s.turns[s.turns.length - 1];
                const preview   = (lastTurn?.text || '').slice(0, 55) + (lastTurn?.text?.length > 55 ? '…' : '');
                const exchanges = Math.floor(s.turns.length / 2);
                return `
                <div class="session-item${s.key === activeKey ? ' active' : ''}" onclick="openSession('${escAttr(s.key)}')">
                    <div class="session-key" title="${escAttr(s.key)}">${escHtml(shortKey)}</div>
                    <div class="session-preview">${escHtml(preview) || '(empty)'}</div>
                    <div class="session-meta">
                        <span>${exchanges} exchange${exchanges !== 1 ? 's' : ''}</span>
                        <span>${s.turns.length} turns</span>
                    </div>
                </div>`;
            }).join('');
        }
 
        /* ══════════════════════════════════════════
           OPEN SESSION → show conversation
        ══════════════════════════════════════════ */
        function openSession(key) {
            activeKey = key;
            renderSessionList();
 
            const s = sessions.find(s => s.key === key);
            if (!s) return;
 
            const exchanges = Math.floor(s.turns.length / 2);
            const viewer    = document.getElementById('chat-viewer');
 
            viewer.innerHTML = `
                <div class="chat-viewer-header">
                    <div>
                        <div class="chat-viewer-key">${escHtml(key)}</div>
                        <div class="chat-viewer-stats">${s.turns.length} turns · ${exchanges} exchange${exchanges !== 1 ? 's' : ''}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteSession('${escAttr(key)}')">🗑 Delete</button>
                </div>
                <div class="chat-messages" id="chat-messages">
                    ${s.turns.map(renderTurn).join('')}
                </div>`;
 
            const msgs = viewer.querySelector('#chat-messages');
            if (msgs) msgs.scrollTop = msgs.scrollHeight;
        }
 
        function renderTurn(turn) {
            const isModel = turn.role === 'model';
            return `
            <div class="msg-row${isModel ? ' model-row' : ''}">
                <div class="avatar ${isModel ? 'avatar-bot' : 'avatar-user'}">${isModel ? '🤖' : '👤'}</div>
                <div>
                    <div class="msg-label">${isModel ? '🤖 Bot' : '👤 User'}</div>
                    <div class="bubble ${isModel ? 'bubble-bot' : 'bubble-user'}">${escHtml(turn.text || '')}</div>
                </div>
            </div>`;
        }
 
        /* ══════════════════════════════════════════
           DELETE SESSION
        ══════════════════════════════════════════ */
        async function deleteSession(key) {
            if (!confirm(`Delete session?\n\n${key}\n\nThis cannot be undone.`)) return;
            try {
                await redisPipeline([['DEL', key]]);
                sessions = sessions.filter(s => s.key !== key);
                document.getElementById('session-count').textContent = sessions.length;
                if (activeKey === key) {
                    activeKey = null;
                    document.getElementById('chat-viewer').innerHTML =
                        '<div class="state-center"><div class="icon">🗑</div><p>Session deleted</p></div>';
                }
                renderSessionList();
            } catch (err) {
                alert('Delete failed: ' + err.message);
            }
        }
 
        /* ══════════════════════════════════════════
           UTILS
        ══════════════════════════════════════════ */
        function escHtml(s) {
            return String(s || '')
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function escAttr(s) { return String(s || '').replace(/'/g, "\\'"); }
 
        /* init */
        loadSessions();
    </script>
</body>
</html>
