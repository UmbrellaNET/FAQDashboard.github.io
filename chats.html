<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UmbrellaNet</title>

  <link rel="apple-touch-icon" sizes="180x180" href="img/logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="img/logo.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="img/logo.svg">

  <style>
    :root{
      --bg:#1c1a2e; --primary:#5E185B; --accent:#15a428; --secondary:#32c245;
      --muted:#2b2b44; --text:#f1e6f9; --card:#2a2740;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    body{margin:0;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
    .app{display:grid;grid-template-columns:260px 280px 1fr;height:100vh;}

    /* ── Sidebar ── */
    .sidebar{background:var(--card);border-right:1px solid #333;display:flex;flex-direction:column;padding:20px;overflow:hidden;}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
    .logo{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
    .brand h1{font-size:18px;margin:0}
    .nav{display:flex;flex-direction:column;gap:8px;margin-top:10px;overflow-y:auto;}
    .nav a{color:var(--text);text-decoration:none;padding:10px;border-radius:8px}
    .nav a:hover{background:var(--muted)}.nav a.active{background:var(--primary);color:white}
    .new-chat{margin-top:auto;}
    .new-chat input{width:100%;padding:8px;border-radius:8px;border:1px solid #444;background:var(--bg);color:var(--text);margin-bottom:8px;box-sizing:border-box;}
    .new-chat button{width:100%;padding:8px;border-radius:8px;border:0;background:var(--primary);color:white;cursor:pointer}

    /* ── Session list ── */
    .chat-list{background:var(--card);border-right:1px solid #333;display:flex;flex-direction:column;overflow:hidden;}
    .chat-list-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;flex-shrink:0;}
    .chat-list-header h2{font-size:16px;margin:0;}
    .refresh-btn{background:none;border:1px solid #444;color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
    .refresh-btn:hover{background:var(--muted);}
    .chat-list-scroll{overflow-y:auto;flex:1;}
    .chat-item{padding:12px 16px;border-bottom:1px solid #333;cursor:pointer;display:flex;flex-direction:column;}
    .chat-item:hover{background:var(--muted)}.chat-item.active{background:var(--primary);color:white}
    .chat-name{font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
    .session-badge{font-size:10px;background:#333;color:#aaa;padding:1px 5px;border-radius:4px;font-weight:400;}
    .chat-item.active .session-badge{background:rgba(255,255,255,0.2);color:#eee;}
    .chat-preview{font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .chat-item.active .chat-preview{color:#ddd;}
    .chat-time{font-size:11px;color:#999;align-self:flex-end;}
    .chat-item.active .chat-time{color:#ddd;}

    /* ── Main area ── */
    .main{display:flex;flex-direction:column;overflow:hidden;}
    .topbar{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;flex-shrink:0;}
    .topbar nav{display:flex;gap:20px}
    .topbar nav a{color:var(--text);text-decoration:none;font-weight:500}
    .topbar nav a:hover{color:var(--accent)}
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-main{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#211f38,#1c1a2e)}
    .message{max-width:70%;padding:12px 14px;border-radius:12px;line-height:1.4;word-wrap:break-word;overflow-wrap:break-word;}
    .user{align-self:flex-start;background:var(--muted);color:var(--text)}
    .bot{align-self:flex-end;background:var(--accent);color:white}
    .composer{display:flex;gap:10px;padding:14px;border-top:1px solid #333;align-items:center;background:var(--card);flex-shrink:0;}
    .composer input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #444;background:var(--bg);color:var(--text)}
    .composer button.send{background:var(--primary);color:white;border:0;padding:10px 14px;border-radius:10px;cursor:pointer}

    /* ── Misc ── */
    .status-message{text-align:center;color:#aaa;font-style:italic;margin:10px 0;}
    .message-status{font-size:11px;margin-top:4px;text-align:right;}
    .date-divider{text-align:center;color:#aaa;font-size:12px;margin:16px 0;position:relative;}
    .date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:#444;}
    .date-divider::before{left:0;}.date-divider::after{right:0;}
    .logo-img{width:60px;height:60px;object-fit:contain;}
    .role-label{font-size:10px;opacity:.65;margin-bottom:3px;text-transform:uppercase;letter-spacing:.5px;}
    .loading-dots{display:flex;gap:4px;align-items:center;justify-content:center;padding:24px;}
    .loading-dots span{width:7px;height:7px;border-radius:50%;background:#888;animation:db 1.4s infinite ease-in-out;}
    .loading-dots span:nth-child(2){animation-delay:.2s;}
    .loading-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes db{0%,80%,100%{transform:scale(.8);opacity:.4;}40%{transform:scale(1.2);opacity:1;}}
    @media(max-width:1000px){.app{grid-template-columns:1fr;}}
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><img src="img/logo.svg" alt="" class="logo-img"></div>
      <div>
        <h1 style="color:#fff;">UmbrellaNet</h1>
        <div style="font-size:12px;color:white">Admin Dashboard</div>
      </div>
    </div>
    <nav class="nav">
      <a href="chats.html" class="active">Chats</a>
      <a href="analytics.html">Analytics</a>
      <a href="index2.html">Dashboard</a>
    </nav>
    <div class="new-chat">
      <input id="findInput" placeholder="Find session by ID" />
      <button id="findBtn">Find Session</button>
    </div>
  </aside>

  <!-- ── Session list ── -->
  <aside class="chat-list">
    <div class="chat-list-header">
      <h2>Active Sessions</h2>
      <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
    </div>
    <div class="chat-list-scroll" id="chatList">
      <div class="loading-dots"><span></span><span></span><span></span></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar"><strong id="chatTitle">Sessions</strong></div>
    <div class="chat-area">
      <section class="chat-main" id="chatMain">
        <div class="status-message" style="margin-top:60px;">Select a session to view messages</div>
      </section>
      <div class="composer">
        <input id="chatInput" placeholder="Select a session to view messages" disabled />
        <button class="send" id="sendBtn" disabled>Send</button>
      </div>
    </div>
  </div>

</div>
<script>
  // ─── CONFIG ──────────────────────────────────────────────────────────────────
  const CONFIG = {
    upstash: {
      endpoint: "https://quiet-snapper-78920.upstash.io",
      // Token cleaned from screenshot: removed leading "* ", fixed @ → 0 twice
      token: "gQAAAAAAATRIAAIncDFmMTQwZm2yMTcyNDY0MWNkYmZk0GY0MDM3Mj1jODM3N3AxNzg5MjA"
    }
  };

  // Python backend key format: umbrellanet_chat_{ipHash16}_{sessionId}
  // Storage: Redis LIST via RPUSH. Each element is JSON: { role, text, timestamp? }
  // First 2 items are system-prompt bootstrap → skip them
  const BOOTSTRAP = 2;

  const $chatMain  = document.getElementById('chatMain');
  const $chatInput = document.getElementById('chatInput');
  const $sendBtn   = document.getElementById('sendBtn');
  const $chatList  = document.getElementById('chatList');
  const $chatTitle = document.getElementById('chatTitle');
  const $refresh   = document.getElementById('refreshBtn');
  const $findInput = document.getElementById('findInput');
  const $findBtn   = document.getElementById('findBtn');

  let sessions    = {};   // key → turns[]
  let currentKey  = null;

  // ─── Upstash REST ─────────────────────────────────────────────────────────────
  async function upstash(path) {
    const res = await fetch(CONFIG.upstash.endpoint + path, {
      headers: { Authorization: `Bearer ${CONFIG.upstash.token}` }
    });
    if (!res.ok) throw new Error(`Upstash ${res.status}: ${await res.text()}`);
    return res.json();
  }

  async function scanKeys(pattern) {
    let all = [], cursor = '0';
    do {
      const j = await upstash(`/scan/${cursor}?match=${encodeURIComponent(pattern)}&count=100`);
      cursor = j.result[0];
      all.push(...(j.result[1] || []));
    } while (cursor !== '0');
    return [...new Set(all)];
  }

  async function fetchList(key) {
    const j = await upstash(`/lrange/${encodeURIComponent(key)}/0/-1`);
    return (j.result || []).map(s => { try { return JSON.parse(s); } catch { return null; } }).filter(Boolean);
  }

  // ─── Key helpers ──────────────────────────────────────────────────────────────
  function parseKey(key) {
    const s = key.replace(/^umbrellanet_chat_/, '');
    const m = s.match(/^([0-9a-f]{16})_(.+)$/i);
    return m ? { ipHash: m[1], sessionId: m[2] } : { ipHash: 'unknown', sessionId: s };
  }

  // ─── Load all sessions ────────────────────────────────────────────────────────
  async function loadSessions() {
    $chatList.innerHTML = `<div class="loading-dots"><span></span><span></span><span></span></div>`;
    sessions = {};
    try {
      const keys = await scanKeys('umbrellanet_chat_*');
      if (!keys.length) { $chatList.innerHTML = '<div class="status-message">No sessions found</div>'; return; }

      const results = await Promise.allSettled(keys.map(async k => ({ key: k, turns: await fetchList(k) })));
      $chatList.innerHTML = '';

      const valid = results
        .filter(r => r.status === 'fulfilled' && r.value.turns.length > BOOTSTRAP)
        .map(r => r.value);

      if (!valid.length) { $chatList.innerHTML = '<div class="status-message">No sessions with messages</div>'; return; }

      valid.forEach(({ key, turns }) => { sessions[key] = turns; addToList(key, turns); });

      // Auto-select first item
      const first = $chatList.querySelector('.chat-item');
      if (first) switchSession(first.dataset.key, first);

    } catch (err) {
      console.error(err);
      $chatList.innerHTML = `<div class="status-message">Error: ${err.message}</div>`;
    }
  }

  // ─── Add item to session list ─────────────────────────────────────────────────
  function addToList(key, turns) {
    const { ipHash, sessionId } = parseKey(key);
    const real    = turns.slice(BOOTSTRAP);
    const last    = real[real.length - 1];
    const preview = last?.text ? (last.text.length > 32 ? last.text.slice(0, 32) + '…' : last.text) : 'No messages';

    const item = document.createElement('div');
    item.className   = 'chat-item';
    item.dataset.key = key;
    item.innerHTML   = `
      <div class="chat-name">
        ${esc(sessionId)}
        <span class="session-badge">${real.length} msg</span>
      </div>
      <div class="chat-preview">${esc(preview)}</div>
      <div class="chat-time">IP: ${ipHash.slice(0,8)}…</div>
    `;
    item.addEventListener('click', () => switchSession(key, item));
    $chatList.appendChild(item);
  }

  // ─── Render session messages ──────────────────────────────────────────────────
  function renderSession(key) {
    $chatMain.innerHTML = '';
    const turns = (sessions[key] || []).slice(BOOTSTRAP);
    const { sessionId } = parseKey(key);

    if (!turns.length) {
      $chatMain.innerHTML = '<div class="status-message">No messages in this session</div>';
      return;
    }

    let lastDate = null;
    turns.forEach(turn => {
      if (!turn?.text) return;
      const isUser  = turn.role === 'user';
      const cls     = isUser ? 'user' : 'bot';
      const dateStr = turn.timestamp ? new Date(turn.timestamp).toDateString() : new Date().toDateString();

      if (lastDate !== dateStr) {
        const d = document.createElement('div');
        d.className   = 'date-divider';
        d.textContent = dateLabel(dateStr);
        $chatMain.appendChild(d);
        lastDate = dateStr;
      }

      const timeStr = turn.timestamp
        ? new Date(turn.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        : '';

      const div = document.createElement('div');
      div.className = `message ${cls}`;
      div.innerHTML = `
        <div class="role-label">${isUser ? '👤 User' : '🤖 Assistant'}</div>
        ${esc(turn.text)}
        <div class="message-status" style="color:${isUser ? '#999' : 'rgba(255,255,255,0.6)'};">${timeStr}</div>
      `;
      $chatMain.appendChild(div);
    });

    $chatTitle.textContent = `Session: ${sessionId}`;
    $chatMain.scrollTop = $chatMain.scrollHeight;
  }

  // ─── Switch session ───────────────────────────────────────────────────────────
  function switchSession(key, item) {
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    currentKey = key;
    renderSession(key);
  }

  // ─── Find session ─────────────────────────────────────────────────────────────
  $findBtn.addEventListener('click', () => {
    const val = $findInput.value.trim();
    if (!val) return;
    const match = Object.keys(sessions).find(k => parseKey(k).sessionId === val);
    if (match) {
      const item = $chatList.querySelector(`.chat-item[data-key="${CSS.escape(match)}"]`);
      if (item) switchSession(match, item);
    } else {
      alert(`No session found with ID: ${val}`);
    }
    $findInput.value = '';
  });
  $findInput.addEventListener('keypress', e => { if (e.key === 'Enter') $findBtn.click(); });

  // ─── Utils ───────────────────────────────────────────────────────────────────
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function dateLabel(ds) {
    const today = new Date().toDateString();
    const yest  = new Date(Date.now()-86400000).toDateString();
    if (ds === today) return 'Today';
    if (ds === yest)  return 'Yesterday';
    return new Date(ds).toLocaleDateString([],{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  }

  // ─── Init ─────────────────────────────────────────────────────────────────────
  $refresh.addEventListener('click', loadSessions);
  loadSessions();
</script>
</body>
</html>
