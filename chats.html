<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UmbrellaNet</title>

  <link rel="apple-touch-icon" sizes="180x180" href="img/logo.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="img/logo.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="img/logo.svg">

  <style>
    :root{
      --bg:#1c1a2e; --primary:#5E185B; --accent:#15a428; --secondary:#32c245;
      --muted:#2b2b44; --text:#f1e6f9; --card:#2a2740;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    body{margin:0;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;}
    .app{display:grid;grid-template-columns:260px 280px 1fr;height:100vh;}
    .sidebar{background:var(--card);border-right:1px solid #333;display:flex;flex-direction:column;padding:20px;overflow:hidden;}
    .brand{display:flex;gap:12px;align-items:center;margin-bottom:20px}
    .logo{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:700;color:white}
    .brand h1{font-size:18px;margin:0}
    .nav{display:flex;flex-direction:column;gap:8px;margin-top:10px;overflow-y:auto;}
    .nav a{color:var(--text);text-decoration:none;padding:10px;border-radius:8px}
    .nav a:hover{background:var(--muted)}.nav a.active{background:var(--primary);color:white}
    .sidebar-footer{margin-top:auto;font-size:12px;color:#888;padding-top:12px;border-top:1px solid #333;}
    .sidebar-footer span{display:block;margin-bottom:4px;}
    .chat-list{background:var(--card);border-right:1px solid #333;display:flex;flex-direction:column;overflow:hidden;}
    .chat-list-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px;}
    .chat-list-header h2{font-size:16px;margin:0;}
    .refresh-btn{background:none;border:1px solid #444;color:var(--text);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
    .refresh-btn:hover{background:var(--muted);}
    .chat-list-scroll{overflow-y:auto;flex:1;}
    .chat-item{padding:12px 16px;border-bottom:1px solid #333;cursor:pointer;display:flex;flex-direction:column;}
    .chat-item:hover{background:var(--muted)}.chat-item.active{background:var(--primary);color:white}
    .chat-name{font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:6px;}
    .session-badge{font-size:10px;background:#333;color:#aaa;padding:1px 5px;border-radius:4px;font-weight:400;}
    .chat-item.active .session-badge{background:rgba(255,255,255,0.2);color:#eee;}
    .chat-preview{font-size:13px;color:#bbb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .chat-item.active .chat-preview{color:#ddd;}
    .chat-time{font-size:11px;color:#999;align-self:flex-end;margin-top:2px;}
    .chat-item.active .chat-time{color:#ddd;}
    .main{display:flex;flex-direction:column;overflow:hidden;}
    .topbar{background:var(--card);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333;flex-shrink:0;}
    .topbar nav{display:flex;gap:20px}
    .topbar nav a{color:var(--text);text-decoration:none;font-weight:500}
    .topbar nav a:hover{color:var(--accent)}
    .topbar-meta{font-size:12px;color:#888;}
    .chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .chat-main{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#211f38,#1c1a2e)}
    .message{max-width:70%;padding:12px 14px;border-radius:12px;line-height:1.4;word-wrap:break-word;overflow-wrap:break-word;}
    .user{align-self:flex-start;background:var(--muted);color:var(--text)}
    .bot{align-self:flex-end;background:var(--accent);color:white}
    .composer{display:flex;gap:10px;padding:14px;border-top:1px solid #333;align-items:center;background:var(--card);flex-shrink:0;}
    .composer input{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #444;background:var(--bg);color:var(--text)}
    .composer input:disabled{opacity:0.5;cursor:not-allowed;}
    .composer button.send{background:var(--primary);color:white;border:0;padding:10px 14px;border-radius:10px;cursor:pointer}
    .composer button.send:disabled{opacity:0.5;cursor:not-allowed;}
    .status-message{text-align:center;color:#aaa;font-style:italic;margin:10px 0;}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:12px;color:#666;}
    .empty-state svg{opacity:0.3;}
    .date-divider{text-align:center;color:#aaa;font-size:12px;margin:16px 0;position:relative;}
    .date-divider::before,.date-divider::after{content:'';position:absolute;top:50%;width:30%;height:1px;background:#444;}
    .date-divider::before{left:0;}.date-divider::after{right:0;}
    .logo-img{width:60px;height:60px;object-fit:contain;}
    .role-label{font-size:10px;color:#888;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px;}
    .message-time{font-size:11px;color:#999;margin-top:4px;text-align:right;}
    .bot .message-time{color:rgba(255,255,255,0.6);}
    .loading-dots{display:inline-flex;gap:4px;align-items:center;}
    .loading-dots span{width:6px;height:6px;border-radius:50%;background:#888;animation:dot-bounce 1.4s infinite ease-in-out;}
    .loading-dots span:nth-child(2){animation-delay:0.2s;}
    .loading-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes dot-bounce{0%,80%,100%{transform:scale(0.8);opacity:0.5;}40%{transform:scale(1.2);opacity:1;}}
    .session-info-bar{background:#1e1c35;border-bottom:1px solid #2e2c4a;padding:8px 20px;font-size:12px;color:#888;display:flex;gap:16px;}
    .session-info-bar span{display:flex;align-items:center;gap:4px;}
    .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);}
    @media (max-width:1000px){.app{grid-template-columns:1fr;}}
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">
          <img src="img/logo.svg" alt="" class="logo-img">
        </div>
        <div>
          <h1 style="color:#fff;">UmbrellaNet</h1>
          <div style="font-size:12px;color:white">Admin Dashboard</div>
        </div>
      </div>
      <nav class="nav">
        <a href="chats.html" class="active">Chats</a>
        <a href="analytics.html">Analytics</a>
        <a href="index2.html">Dashboard</a>
      </nav>
      <div class="sidebar-footer">
        <span>📡 Redis: quiet-snapper-78920</span>
        <span>🔑 Session-based storage</span>
      </div>
    </aside>

    <!-- Chat list -->
    <aside class="chat-list">
      <div class="chat-list-header">
        <h2>Sessions</h2>
        <button class="refresh-btn" id="refreshBtn">↻ Refresh</button>
      </div>
      <div class="chat-list-scroll" id="chatList">
        <div class="status-message">
          <div class="loading-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <strong id="chatTitle">Select a session</strong>
        <div class="topbar-meta" id="topbarMeta"></div>
      </div>
      <div id="sessionInfoBar" class="session-info-bar" style="display:none;"></div>
      <div class="chat-area">
        <section class="chat-main" id="chatMain">
          <div class="empty-state">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <div>Select a session to view messages</div>
          </div>
        </section>
        <div class="composer">
          <input id="chatInput" placeholder="Select a session to reply…" disabled />
          <button class="send" id="sendBtn" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ─── CONFIG ──────────────────────────────────────────────
    // Uses the Python backend's Upstash instance (from screenshot)
    const CONFIG = {
      upstash: {
        endpoint: "https://quiet-snapper-78920.upstash.io",
        token: "gQAAAAAAATRIAAIncDFmMTQwZmQyMTcyNDY0MWNkYmZkOGY0MDM3Mjl1jODM3N3AxNzg5MjA"
      }
    };

    // ─── Key format from Python backend:
    //   umbrellanet_chat_{ip_hash_16chars}_{session_id}
    //   stored as a Redis LIST (RPUSH), each item is a JSON string
    //   with shape: { role: "user"|"model", text: "..." }
    //   The first two items are always the system-prompt bootstrap (skip them)

    const SYSTEM_BOOTSTRAP_TURNS = 2; // skip first 2 list items (system prompt bootstrap)

    const chatMain   = document.getElementById('chatMain');
    const chatInput  = document.getElementById('chatInput');
    const sendBtn    = document.getElementById('sendBtn');
    const chatList   = document.getElementById('chatList');
    const chatTitle  = document.getElementById('chatTitle');
    const topbarMeta = document.getElementById('topbarMeta');
    const sessionBar = document.getElementById('sessionInfoBar');
    const refreshBtn = document.getElementById('refreshBtn');

    let sessions     = {};   // key → array of turn objects
    let currentKey   = null;

    // ─── UPSTASH HELPERS ─────────────────────────────────────

    async function upstashFetch(path, opts = {}) {
      const url = `${CONFIG.upstash.endpoint}${path}`;
      const res = await fetch(url, {
        ...opts,
        headers: {
          Authorization: `Bearer ${CONFIG.upstash.token}`,
          'Content-Type': 'application/json',
          ...(opts.headers || {})
        }
      });
      if (!res.ok) throw new Error(`Upstash ${res.status}: ${res.statusText}`);
      return res.json();
    }

    async function scanKeys(pattern = "umbrellanet_chat_*") {
      let allKeys = [];
      let cursor  = '0';
      do {
        const json = await upstashFetch(
          `/scan/${cursor}?match=${encodeURIComponent(pattern)}&count=100`
        );
        cursor = json.result[0];
        allKeys.push(...(json.result[1] || []));
      } while (cursor !== '0');
      return [...new Set(allKeys)];
    }

    // Fetch all items from a Redis list
    async function fetchList(key) {
      const encoded = encodeURIComponent(key);
      const json    = await upstashFetch(`/lrange/${encoded}/0/-1`);
      const raw     = json.result || [];
      return raw.map(item => {
        try { return JSON.parse(item); }
        catch { return null; }
      }).filter(Boolean);
    }

    // ─── KEY PARSING ─────────────────────────────────────────
    // Key format: umbrellanet_chat_{ipHash16}_{sessionId}
    function parseKey(key) {
      // Remove prefix
      const stripped = key.replace(/^umbrellanet_chat_/, '');
      // ip hash is first 16 hex chars, then underscore, rest is session_id
      const match = stripped.match(/^([0-9a-f]{16})_(.+)$/i);
      if (match) {
        return { ipHash: match[1], sessionId: match[2] };
      }
      // Fallback
      return { ipHash: 'unknown', sessionId: stripped };
    }

    function shortIp(hash) {
      return hash.substring(0, 8) + '…';
    }

    // ─── LOAD ALL SESSIONS ───────────────────────────────────

    async function loadSessions() {
      chatList.innerHTML = `<div class="status-message"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
      sessions = {};

      try {
        const keys = await scanKeys("umbrellanet_chat_*");

        if (keys.length === 0) {
          chatList.innerHTML = '<div class="status-message">No sessions found</div>';
          return;
        }

        // Fetch all sessions in parallel
        const results = await Promise.allSettled(
          keys.map(async key => {
            const turns = await fetchList(key);
            return { key, turns };
          })
        );

        chatList.innerHTML = '';

        // Sort by most recent message first
        const valid = results
          .filter(r => r.status === 'fulfilled' && r.value.turns.length > SYSTEM_BOOTSTRAP_TURNS)
          .map(r => r.value)
          .sort((a, b) => {
            const lastA = a.turns[a.turns.length - 1]?.timestamp || 0;
            const lastB = b.turns[b.turns.length - 1]?.timestamp || 0;
            return lastB - lastA;
          });

        if (valid.length === 0) {
          chatList.innerHTML = '<div class="status-message">No sessions with messages</div>';
          return;
        }

        valid.forEach(({ key, turns }) => {
          sessions[key] = turns;
          addSessionToList(key, turns);
        });

        // Auto-select first
        const first = chatList.querySelector('.chat-item');
        if (first) switchSession(first.dataset.key, first);

      } catch (err) {
        console.error('Load error:', err);
        chatList.innerHTML = `<div class="status-message">Error: ${err.message}</div>`;
      }
    }

    // ─── RENDER SESSION LIST ITEM ─────────────────────────────

    function addSessionToList(key, turns) {
      const { ipHash, sessionId } = parseKey(key);

      // Real turns (skip bootstrap)
      const real = turns.slice(SYSTEM_BOOTSTRAP_TURNS);
      const last = real[real.length - 1];

      const preview  = last?.text
        ? (last.text.length > 35 ? last.text.substring(0, 35) + '…' : last.text)
        : 'No messages';

      const msgCount = real.length;

      const item = document.createElement('div');
      item.className  = 'chat-item';
      item.dataset.key = key;
      item.innerHTML  = `
        <div class="chat-name">
          <span>Session: ${sessionId}</span>
          <span class="session-badge">${msgCount} msg${msgCount !== 1 ? 's' : ''}</span>
        </div>
        <div class="chat-preview">${escapeHtml(preview)}</div>
        <div class="chat-time">IP: ${shortIp(ipHash)}</div>
      `;
      item.addEventListener('click', () => switchSession(key, item));
      chatList.appendChild(item);
    }

    // ─── RENDER CHAT MESSAGES ─────────────────────────────────

    function renderSession(key) {
      chatMain.innerHTML = '';
      const allTurns = sessions[key] || [];

      // Skip the 2 bootstrap turns (system prompt exchange)
      const turns = allTurns.slice(SYSTEM_BOOTSTRAP_TURNS);

      if (turns.length === 0) {
        chatMain.innerHTML = '<div class="status-message">No real messages in this session</div>';
        return;
      }

      const { ipHash, sessionId } = parseKey(key);

      // Session info bar
      sessionBar.style.display = 'flex';
      sessionBar.innerHTML = `
        <span><span class="dot"></span> Active</span>
        <span>Session ID: <strong>${sessionId}</strong></span>
        <span>IP Hash: <code>${ipHash}</code></span>
        <span>${turns.length} messages</span>
      `;

      let lastDate = null;

      turns.forEach(turn => {
        if (!turn || !turn.text) return;

        const isUser = turn.role === 'user';
        const cls    = isUser ? 'user' : 'bot';

        // Date divider
        const msgDate = turn.timestamp
          ? new Date(turn.timestamp).toDateString()
          : new Date().toDateString();

        if (lastDate !== msgDate) {
          const divider = document.createElement('div');
          divider.className   = 'date-divider';
          divider.textContent = formatDateLabel(msgDate);
          chatMain.appendChild(divider);
          lastDate = msgDate;
        }

        const div = document.createElement('div');
        div.className = `message ${cls}`;

        const timeStr = turn.timestamp
          ? new Date(turn.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          : '';

        div.innerHTML = `
          <div class="role-label">${isUser ? '👤 User' : '🤖 Assistant'}</div>
          <div>${escapeHtml(turn.text)}</div>
          ${timeStr ? `<div class="message-time">${timeStr}</div>` : ''}
        `;
        chatMain.appendChild(div);
      });

      chatMain.scrollTop = chatMain.scrollHeight;

      // Update header
      chatTitle.textContent = `Session: ${sessionId}`;
      topbarMeta.textContent = `${turns.length} messages`;

      // Enable composer (read-only view — composing not applicable for session chats)
      // We'll keep it disabled with a note since sessions are IP-based and we can't reply
      chatInput.disabled    = true;
      chatInput.placeholder = 'Session chats are read-only (IP-based sessions)';
      sendBtn.disabled      = true;
    }

    // ─── SWITCH SESSION ───────────────────────────────────────

    function switchSession(key, item) {
      document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      currentKey = key;
      renderSession(key);
    }

    // ─── UTILITIES ────────────────────────────────────────────

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function formatDateLabel(dateStr) {
      const today     = new Date().toDateString();
      const yesterday = new Date(Date.now() - 86400000).toDateString();
      if (dateStr === today) return 'Today';
      if (dateStr === yesterday) return 'Yesterday';
      return new Date(dateStr).toLocaleDateString([], {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    }

    // ─── INIT ─────────────────────────────────────────────────

    refreshBtn.addEventListener('click', loadSessions);
    loadSessions();
  </script>
</body>
</html>
