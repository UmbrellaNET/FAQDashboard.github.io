<body>
	<div class="login-header box-shadow">
		<div class="container-fluid d-flex justify-content-between align-items-center">
			<div class="brand-logo">
				<a href="login.html">
					<img src="img/logo.png" alt="" style="margin-top:120px;">
				</a>
			</div>
			
		</div>
	</div>
	<div class="login-wrap d-flex align-items-center flex-wrap justify-content-center">
		<div class="container">
			<div class="row align-items-center">
				<div class="col-md-6">
					<img src="img/forgot-password.png" alt="">
				</div>
				<div class="col-md-6">
					<div class="login-box bg-white box-shadow border-radius-10">
						<div class="login-title">
							<h2 class="text-center text-primary">Reset Password</h2>
						</div>
						<h6 class="mb-20">Enter your new password, confirm and submit</h6>
						<form id="resetPasswordForm">
							<div class="input-group custom">
								<input type="password" class="form-control form-control-lg" id="newPassword" placeholder="New Password" required>
								<div class="input-group-append custom">
									<span class="input-group-text"><i class="dw dw-padlock1"></i></span>
								</div>
							</div>
							<div class="input-group custom">
								<input type="password" class="form-control form-control-lg" id="confirmPassword" placeholder="Confirm New Password" required>
								<div class="input-group-append custom">
									<span class="input-group-text"><i class="dw dw-padlock1"></i></span>
								</div>
							</div>
							<div class="row align-items-center">
								<div class="col-5">
									<div class="input-group mb-0">
										<input class="btn btn-primary btn-lg btn-block" type="submit" value="Submit" id="resetButton">
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- success Popup html Start -->
	<button type="button" id="success-modal-btn" hidden data-toggle="modal" data-target="#success-modal" data-backdrop="static">Launch modal</button>
	<div class="modal fade" id="success-modal" tabindex="-1" role="dialog" aria-labelledby="exampleModalCenterTitle" aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered max-width-400" role="document">
			<div class="modal-content">
				<div class="modal-body text-center font-18">
					<h3 class="mb-20">Password Reset Successful!</h3>
					<div class="mb-30 text-center"><img src="img/success.png"></div>
					Your password has been updated successfully.
				</div>
				<div class="modal-footer justify-content-center">
					<a href="login.html" class="btn btn-primary">Continue to Login</a>
				</div>
			</div>
		</div>
	</div>
	<!-- success Popup html End -->
	<!-- js -->
	<script src="js/core.js"></script>
	<script src="js/script.min.js"></script>
	<script src="js/process.js"></script>
	<script src="js/layout-settings.js"></script>
	
	<!-- Firebase Auth Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const resetPasswordForm = document.getElementById('resetPasswordForm');
			const resetButton = document.getElementById('resetButton');
			const successModalBtn = document.getElementById('success-modal-btn');
			
			// Get the password reset code from URL
			const urlParams = new URLSearchParams(window.location.search);
			const oobCode = urlParams.get('oobCode');
			
			if (!oobCode) {
				alert('Invalid password reset link. Please request a new one.');
				window.location.href = 'login.html';
				return;
			}
			
			// Password reset form submission
			resetPasswordForm.addEventListener('submit', function(e) {
				e.preventDefault();
				const newPassword = document.getElementById('newPassword').value;
				const confirmPassword = document.getElementById('confirmPassword').value;
				
				// Validate passwords match
				if (newPassword !== confirmPassword) {
					alert("Passwords don't match!");
					return;
				}
				
				// Validate password strength (optional)
				if (newPassword.length < 6) {
					alert("Password should be at least 6 characters");
					return;
				}
				
				resetButton.disabled = true;
				resetButton.value = "Processing...";
				
				// Confirm the password reset code and update password
				firebase.auth().confirmPasswordReset(oobCode, newPassword)
					.then(() => {
						// Password reset successful
						successModalBtn.click();
					})
					.catch((error) => {
						// Handle errors
						const errorCode = error.code;
						const errorMessage = error.message;
						alert(errorMessage);
						resetButton.disabled = false;
						resetButton.value = "Submit";
					});
			});
		});
	</script>
</body>
</html>
