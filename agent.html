<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Panel – Umbrella Labs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface2: #0f172a;
            --border: rgba(235, 178, 230, 0.25);
            --accent: #EBB2E6;
            --accent2: #5E185B;
            --blue: #38bdf8;
            --green: #10b981;
            --amber: #f59e0b;
            --red: #ef4444;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --msg-agent: rgba(104, 61, 102, 0.85);
            --msg-user: rgba(129, 140, 248, 0.2);
            /* analytics sidebar vars */
            --nav-bg: #2a2740;
            --nav-primary: #5E185B;
            --nav-text: #f1e6f9;
            --nav-muted: #2b2b44;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
        }

        /* ── ANALYTICS-STYLE NAV SIDEBAR ── */
        .nav-sidebar {
            width: 240px;
            background: var(--nav-bg);
            padding: 20px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            border-right: 1px solid #333;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .nav-brand {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 20px;
        }

        .nav-logo {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
        }

        .nav-logo img {
            width: 60px;
            height: 60px;
            object-fit: contain;
        }

        .nav-brand h1 {
            font-size: 18px;
            margin: 0;
            color: #fff;
        }

        .nav-brand .nav-sub {
            font-size: 12px;
            color: white;
        }

        .nav-links {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .nav-links a {
            color: var(--nav-text);
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .nav-links a:hover {
            background: var(--nav-muted);
        }

        .nav-links a.active {
            background: var(--nav-primary);
            color: white;
        }

        /* ── MAIN WRAPPER (offset by nav sidebar) ── */
        .app-wrapper {
            margin-left: 240px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* ── LOGIN SCREEN ── */
        #loginScreen {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .login-card h1 {
            font-size: 1.6rem;
            background: var(--accent);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }

        .login-card p {
            font-size: 14px;
            color: var(--muted);
            text-align: center;
        }

        .login-card label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: -12px;
        }

        .login-card input {
            padding: 11px 15px;
            border-radius: 11px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-card input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(235,178,230,0.15);
        }

        .login-card .btn-primary {
            padding: 12px;
            border-radius: 11px;
            background: linear-gradient(to right, var(--accent2), var(--accent));
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-card .btn-primary:hover {
            opacity: 0.88;
        }

        /* ── AGENT PANEL ── */
        #agentPanel {
            flex: 1;
            display: none;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .topbar-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--blue), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: white;
        }

        .topbar h2 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .topbar .subtitle {
            font-size: 12px;
            color: var(--muted);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13px;
            font-weight: 600;
        }

        .status-dot-lg {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse-dot 2s infinite;
        }

        .btn-logout {
            background: none;
            border: 1px solid rgba(239,68,68,0.4);
            color: var(--red);
            border-radius: 9px;
            padding: 7px 14px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-logout:hover {
            background: rgba(239,68,68,0.1);
        }

        /* Main layout */
        .panel-body {
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 0;
            height: calc(100vh - 69px);
        }

        /* ── Sidebar: incoming + active requests ── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-title {
            padding: 16px 18px 10px;
            font-size: 11px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 700;
            border-bottom: 1px solid var(--border);
        }

        #requestList {
            flex: 1;
            overflow-y: auto;
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            font-size: 13px;
        }

        .empty-state i {
            font-size: 28px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.4;
        }

        .request-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .request-card:hover {
            border-color: var(--accent);
            background: rgba(235,178,230,0.04);
        }

        .request-card.active {
            border-color: var(--accent);
            background: rgba(235,178,230,0.07);
        }

        .rc-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .rc-name {
            font-size: 14px;
            font-weight: 700;
        }

        .rc-time {
            font-size: 11px;
            color: var(--muted);
        }

        .rc-preview {
            font-size: 12px;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 10px;
        }

        .rc-actions {
            display: flex;
            gap: 8px;
        }

        .btn-accept, .btn-deny {
            flex: 1;
            padding: 7px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-accept {
            background: var(--green);
            color: white;
        }

        .btn-deny {
            background: rgba(239,68,68,0.15);
            color: var(--red);
            border: 1px solid rgba(239,68,68,0.3);
        }

        .btn-accept:hover, .btn-deny:hover {
            opacity: 0.82;
        }

        .rc-live-badge {
            font-size: 11px;
            font-weight: 700;
            color: var(--green);
            background: rgba(16,185,129,0.12);
            border-radius: 20px;
            padding: 3px 9px;
        }

        /* ── Chat area ── */
        .chat-area {
            display: flex;
            flex-direction: column;
            background: var(--bg);
        }

        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            gap: 14px;
        }

        .chat-placeholder i {
            font-size: 48px;
            opacity: 0.2;
        }

        .chat-placeholder p {
            font-size: 15px;
        }

        /* Active chat */
        #activeChat {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        .chat-top {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-top-info h3 {
            font-size: 15px;
            font-weight: 700;
        }

        .chat-top-info p {
            font-size: 12px;
            color: var(--muted);
        }

        .btn-end {
            background: none;
            border: 1px solid rgba(239,68,68,0.4);
            color: var(--red);
            border-radius: 9px;
            padding: 7px 16px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .btn-end:hover {
            background: rgba(239,68,68,0.1);
        }

        .messages-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .msg {
            max-width: 75%;
            padding: 13px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
        }

        .msg-user {
            background: var(--msg-user);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }

        .msg-agent {
            background: var(--msg-agent);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .msg-ts {
            font-size: 11px;
            color: var(--muted);
            margin-top: 4px;
            text-align: right;
        }

        .msg-label {
            font-size: 10px;
            font-weight: 700;
            margin-bottom: 3px;
            color: var(--muted);
        }

        .system-notice {
            text-align: center;
            font-size: 12px;
            color: var(--muted);
            padding: 6px 14px;
            border: 1px dashed rgba(206,62,192,0.4);
            border-radius: 20px;
            margin: 2px auto;
            max-width: 90%;
        }

        .input-area {
            padding: 16px 20px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 11px 16px;
            border-radius: 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .input-area input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(235,178,230,0.15);
        }

        .input-area button {
            background: linear-gradient(to right, var(--accent2), var(--accent));
            border: none;
            border-radius: 12px;
            width: 48px;
            color: white;
            font-size: 17px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .input-area button:hover {
            opacity: 0.88;
        }

        /* Notification toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 14px;
            padding: 14px 18px;
            min-width: 280px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: slideInRight 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toast i {
            font-size: 20px;
            color: var(--accent);
        }

        .toast-body p:first-child {
            font-size: 14px;
            font-weight: 700;
        }

        .toast-body p:last-child {
            font-size: 12px;
            color: var(--muted);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        /* Responsive */
        @media (max-width: 700px) {
            .nav-sidebar { display: none; }
            .app-wrapper { margin-left: 0; }
            .panel-body { grid-template-columns: 1fr; }
            .sidebar {
                max-height: 220px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }
        }
    </style>
</head>
<body>

    <!-- ════════════ NAV SIDEBAR (from analytics.html) ════════════ -->
    <aside class="nav-sidebar">
        <div class="nav-brand">
            <div class="nav-logo">
                <img src="img/logo.svg" alt="">
            </div>
            <div>
                <h1>UmbrellaNet</h1>
                <div class="nav-sub">Admin Dashboard</div>
            </div>
        </div>
        <nav class="nav-links">
            <a href="chats.html">Chats</a>
            <a href="analytics.html">Analytics</a>
            <a href="agent.html" class="active">Agent</a>
            <a href="index2.html">Dashboard</a>
        </nav>
    </aside>

    <!-- ════════════ MAIN APP WRAPPER ════════════ -->
    <div class="app-wrapper">

        <!-- ════════════ LOGIN ════════════ -->
        <div id="loginScreen">
            <div class="login-card">
                <h1><i class="fas fa-headset"></i> Agent Panel</h1>
                <p>Enter your name to go online and start receiving chat requests.</p>
                <label for="agentNameInput">Your name</label>
                <input type="text" id="agentNameInput" placeholder="e.g. Sarah" maxlength="40" autocomplete="off">
                <button class="btn-primary" id="loginBtn">Go Online <i class="fas fa-arrow-right"></i></button>
            </div>
        </div>

        <!-- ════════════ AGENT PANEL ════════════ -->
        <div id="agentPanel">
            <div class="topbar">
                <div class="topbar-left">
                    <div class="topbar-avatar"><i class="fas fa-headset"></i></div>
                    <div>
                        <h2 id="topbarName">Agent</h2>
                        <div class="subtitle">Umbrella Labs Support</div>
                    </div>
                </div>
                <div class="status-badge">
                    <div class="status-dot-lg" id="onlineDot"></div>
                    <span id="onlineLabel">Online</span>
                </div>
                
            </div>

            <div class="panel-body">
                <!-- Incoming & Active chats sidebar -->
                <div class="sidebar">
                    <div class="sidebar-title"><i class="fas fa-inbox"></i> &nbsp;Incoming &amp; Active Chats</div>
                    <div id="requestList">
                        <div class="empty-state" id="emptyState">
                            <i class="fas fa-comment-dots"></i>
                            No pending requests
                        </div>
                    </div>
                </div>

                <!-- Chat area -->
                <div class="chat-area" id="chatArea">
                    <div class="chat-placeholder" id="chatPlaceholder">
                        <i class="fas fa-comments"></i>
                        <p>Select a chat from the sidebar</p>
                    </div>

                    <div id="activeChat">
                        <div class="chat-top">
                            <div class="chat-top-info">
                                <h3 id="activeChatName">User</h3>
                                <p id="activeChatSub">Live chat</p>
                            </div>
                            <button class="btn-end" id="endChatBtn"><i class="fas fa-times-circle"></i> End session</button>
                        </div>
                        <div class="messages-wrap" id="messagesWrap"></div>
                        <div class="input-area">
                            <input type="text" id="agentInput" placeholder="Type a message…" autocomplete="off">
                            <button id="agentSend"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /.app-wrapper -->

    <script>
        const CHANNEL = 'umbrellanet_livechat';
        const bc = new BroadcastChannel(CHANNEL);

        let agentName = '';
        let heartbeatTimer = null;
        let activeChatId = null;

        const chats = {};

        const loginScreen   = document.getElementById('loginScreen');
        const agentPanel    = document.getElementById('agentPanel');
        const agentNameInput = document.getElementById('agentNameInput');
        const loginBtn      = document.getElementById('loginBtn');
        const topbarName    = document.getElementById('topbarName');
        const logoutBtn     = document.getElementById('logoutBtn');
        const requestList   = document.getElementById('requestList');
        const emptyState    = document.getElementById('emptyState');
        const chatPlaceholder = document.getElementById('chatPlaceholder');
        const activeChatEl  = document.getElementById('activeChat');
        const activeChatName = document.getElementById('activeChatName');
        const activeChatSub = document.getElementById('activeChatSub');
        const messagesWrap  = document.getElementById('messagesWrap');
        const agentInput    = document.getElementById('agentInput');
        const agentSend     = document.getElementById('agentSend');
        const endChatBtn    = document.getElementById('endChatBtn');

        function goOnline() {
            const name = agentNameInput.value.trim();
            if (!name) { agentNameInput.style.borderColor = '#ef4444'; return; }
            agentName = name;
            loginScreen.style.display = 'none';
            agentPanel.style.display = 'flex';
            topbarName.textContent = agentName;
            broadcastOnline();
            heartbeatTimer = setInterval(broadcastOnline, 8000);
        }

        loginBtn.addEventListener('click', goOnline);
        agentNameInput.addEventListener('keypress', e => { if (e.key === 'Enter') goOnline(); });

        logoutBtn.addEventListener('click', () => {
            bc.postMessage({ type: 'AGENT_OFFLINE', agentName });
            clearInterval(heartbeatTimer);
            agentPanel.style.display = 'none';
            loginScreen.style.display = 'flex';
            agentNameInput.value = '';
            agentName = '';
            activeChatId = null;
            Object.keys(chats).forEach(k => delete chats[k]);
            renderSidebar();
            showPlaceholder();
            window.location.href = "index2.html";
        });

        function broadcastOnline() {
            bc.postMessage({ type: 'AGENT_ONLINE', agentName });
        }

        bc.onmessage = (e) => {
            const msg = e.data;

            if (msg.type === 'TRANSFER_REQUEST') {
                if (!chats[msg.userId]) {
                    chats[msg.userId] = {
                        userId: msg.userId,
                        userName: msg.userName || 'Customer',
                        lastMessage: msg.lastMessage || '',
                        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                        status: 'pending',
                        messages: []
                    };
                    renderSidebar();
                    showToast(msg.userName || 'Customer', msg.lastMessage || 'Requesting an agent');
                }
            }

            if (msg.type === 'USER_MSG' && chats[msg.userId] && chats[msg.userId].status === 'live') {
                const chat = chats[msg.userId];
                chat.messages.push({ from: 'user', text: msg.text, time: msg.time });
                if (activeChatId === msg.userId) renderMessages(msg.userId);
                renderSidebar();
            }

            if (msg.type === 'USER_DISCONNECT' && chats[msg.userId]) {
                const chat = chats[msg.userId];
                if (chat.status === 'live' && activeChatId === msg.userId) {
                    addSystemMsg(msg.userId, '🔴 User disconnected');
                    renderMessages(msg.userId);
                }
                chat.status = 'ended';
                renderSidebar();
            }
        };

        function renderSidebar() {
            requestList.innerHTML = '';
            const entries = Object.values(chats).filter(c => c.status !== 'ended');
            if (!entries.length) { requestList.appendChild(emptyState); return; }

            entries.forEach(chat => {
                const card = document.createElement('div');
                card.className = `request-card ${chat.status} ${activeChatId === chat.userId ? 'active' : ''}`;
                card.dataset.id = chat.userId;

                card.innerHTML = `
                    <div class="rc-header">
                        <span class="rc-name">${esc(chat.userName)}</span>
                        <span class="rc-time">${chat.time}</span>
                    </div>
                    <div class="rc-preview">${esc(chat.lastMessage || '(no message)')}</div>
                    ${chat.status === 'pending' ? `
                        <div class="rc-actions">
                            <button class="btn-accept" data-id="${chat.userId}"><i class="fas fa-check"></i> Accept</button>
                            <button class="btn-deny"   data-id="${chat.userId}"><i class="fas fa-times"></i> Deny</button>
                        </div>
                    ` : `
                        <span class="rc-live-badge"><i class="fas fa-circle" style="font-size:8px"></i> Live</span>
                    `}
                `;

                const acceptBtn = card.querySelector('.btn-accept');
                const denyBtn   = card.querySelector('.btn-deny');
                if (acceptBtn) acceptBtn.addEventListener('click', (ev) => { ev.stopPropagation(); acceptChat(chat.userId); });
                if (denyBtn)   denyBtn.addEventListener('click',   (ev) => { ev.stopPropagation(); denyChat(chat.userId); });
                card.addEventListener('click', () => openChat(chat.userId));
                requestList.appendChild(card);
            });
        }

        function acceptChat(userId) {
            const chat = chats[userId];
            if (!chat) return;
            chat.status = 'live';
            addSystemMsg(userId, `✅ You accepted this chat as <strong>${agentName}</strong>`);
            bc.postMessage({ type: 'AGENT_ACCEPT', userId, agentName });
            openChat(userId);
            renderSidebar();
        }

        function denyChat(userId) {
            const chat = chats[userId];
            if (!chat) return;
            bc.postMessage({ type: 'AGENT_DENY', userId, agentName });
            delete chats[userId];
            if (activeChatId === userId) { activeChatId = null; showPlaceholder(); }
            renderSidebar();
        }

        function openChat(userId) {
            const chat = chats[userId];
            if (!chat) return;
            activeChatId = userId;
            chatPlaceholder.style.display = 'none';
            activeChatEl.style.display = 'flex';
            activeChatName.textContent = chat.userName;
            activeChatSub.textContent = chat.status === 'live' ? 'Live session' : 'Pending acceptance';
            renderMessages(userId);
            renderSidebar();
            agentInput.focus();
        }

        function showPlaceholder() {
            chatPlaceholder.style.display = 'flex';
            activeChatEl.style.display = 'none';
        }

        function renderMessages(userId) {
            const chat = chats[userId];
            if (!chat) return;
            messagesWrap.innerHTML = '';
            chat.messages.forEach(m => {
                if (m.system) {
                    const d = document.createElement('div');
                    d.className = 'system-notice';
                    d.innerHTML = m.text;
                    messagesWrap.appendChild(d);
                } else {
                    const d = document.createElement('div');
                    d.className = `msg ${m.from === 'user' ? 'msg-user' : 'msg-agent'}`;
                    d.innerHTML = `
                        <div class="msg-label">${m.from === 'user' ? esc(chat.userName) : esc(agentName)}</div>
                        ${esc(m.text)}
                        <div class="msg-ts">${m.time}</div>
                    `;
                    messagesWrap.appendChild(d);
                }
            });
            messagesWrap.scrollTop = messagesWrap.scrollHeight;
        }

        function addSystemMsg(userId, html) {
            if (!chats[userId]) return;
            chats[userId].messages.push({ system: true, text: html });
        }

        function sendAgentMessage() {
            const text = agentInput.value.trim();
            if (!text || !activeChatId) return;
            const chat = chats[activeChatId];
            if (!chat || chat.status !== 'live') return;
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            chat.messages.push({ from: 'agent', text, time });
            bc.postMessage({ type: 'AGENT_MSG', userId: activeChatId, agentName, text });
            renderMessages(activeChatId);
            agentInput.value = '';
            agentInput.focus();
        }

        agentSend.addEventListener('click', sendAgentMessage);
        agentInput.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendAgentMessage(); } });

        endChatBtn.addEventListener('click', () => {
            if (!activeChatId) return;
            bc.postMessage({ type: 'AGENT_EXIT', userId: activeChatId, agentName });
            addSystemMsg(activeChatId, '🔄 You ended this session');
            chats[activeChatId].status = 'ended';
            renderSidebar();
            activeChatId = null;
            showPlaceholder();
        });

        function showToast(userName, preview) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <i class="fas fa-comment-dots"></i>
                <div class="toast-body">
                    <p>New request from ${esc(userName)}</p>
                    <p>${esc((preview || '').substring(0, 60))}</p>
                </div>
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function esc(str) {
            return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
    </script>
</body>
</html>
