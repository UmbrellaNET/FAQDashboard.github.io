<body class="login-page">

	<div style="position: fixed; top: 16px; left: 20px; z-index: 9999; display: flex; align-items: center; gap: 10px;">
	    <img src="img/logo.svg" alt="UmbrellaNet" style="width: 180px; height: 180px;">
	</div>
	
	<div class="login-wrap d-flex align-items-center flex-wrap justify-content-center">
		
			
		<div class="container">
			<div class="row align-items-center">
				<div class="col-md-6 col-lg-7">
					<img src="img/login-page-img.png" alt="">
				</div>
				<div class="col-md-6 col-lg-5">
					<div class="login-box bg-white box-shadow border-radius-10">
						<div class="login-title">
							<h2 class="text-center text-primary">Login</h2>
						</div>
						<form id="loginForm">
							<div class="select-role col-md-12 d-flex justify-content-center">
								<div class="btn-group btn-group-toggle" data-toggle="buttons">									
									<label class="btn">
										<input type="radio" name="options" id="user">
										<div class="icon"><img src="img/person.svg" class="svg" alt=""></div>
										<span>Admin</span>
									</label>
								</div>
							</div>
							<div class="input-group custom">
								<input type="email" class="form-control form-control-lg" id="email" placeholder="Email" required>
								<div class="input-group-append custom">
									<span class="input-group-text"><i class="icon-copy fa-solid fa-envelope"></i></span>
								</div>
							</div>
							<div class="input-group custom">
								<input type="password" class="form-control form-control-lg" id="password" placeholder="**********" required>
								<div class="input-group-append custom">
									<span class="input-group-text"><i class="icon-copy fa-solid fa-lock"></i></span>
								</div>
							</div>
							<div class="row pb-30">
								<div class="col-6 text-left">
									<a href="forgot-password.html" class="text-primary">Forgot Password</a>
								</div>
								<div class="col-6 text-right">
									<a href="register.html" class="text-primary">Register</a>
								</div>
							</div>
							<div class="row">
								<div class="col-sm-12">
									<div class="input-group mb-0">
										<input class="btn btn-primary btn-lg btn-block" type="submit" value="Sign In" id="signInButton">
									</div>
									<div class="font-16 weight-600 pt-10 pb-10 text-center" data-color="#707373">OR</div>
									<div class="input-group mb-0">
										<button type="button" class="btn btn-outline-primary btn-lg btn-block" id="googleSignIn">
											Continue with Google
										</button>
									</div>
								</div>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>
	<!-- js -->
	<script src="js/core.js"></script>
	<script src="js/script.min.js"></script>
	<script src="js/process.js"></script>
	<script src="js/layout-settings.js"></script>
	
	<!-- Firebase Auth Script -->
	<script>
		document.addEventListener('DOMContentLoaded', function() {
			const loginForm = document.getElementById('loginForm');
			const googleSignIn = document.getElementById('googleSignIn');
			const signInButton = document.getElementById('signInButton');
			
			// Track authentication state but don't redirect automatically
			firebase.auth().onAuthStateChanged((user) => {
				if (user) {
					console.log("User is logged in:", user.email);
					// We'll handle redirects after successful login in the specific handlers
				} else {
					console.log("No user is logged in");
				}
			});
			
			// Email/password login
			loginForm.addEventListener('submit', function(e) {
				e.preventDefault();
				const email = document.getElementById('email').value;
				const password = document.getElementById('password').value;
				
				signInButton.disabled = true;
				signInButton.value = "Signing in...";
				
				firebase.auth().signInWithEmailAndPassword(email, password)
					.then((userCredential) => {
						// Signed in
						const user = userCredential.user;
						window.location.href = 'index2.html';
					})
					.catch((error) => {
						const errorCode = error.code;
						const errorMessage = error.message;
						alert(errorMessage);
						signInButton.disabled = false;
						signInButton.value = "Sign In";
					});
			});
			
			// Google Sign-In
			googleSignIn.addEventListener('click', function() {
				googleSignIn.disabled = true;
				googleSignIn.textContent = "Signing in...";
				
				const provider = new firebase.auth.GoogleAuthProvider();
				
				firebase.auth().signInWithPopup(provider)
					.then((result) => {
						window.location.href = 'index2.html';
					}).catch((error) => {
						const errorMessage = error.message;
						alert(errorMessage);
						googleSignIn.disabled = false;
						googleSignIn.textContent = "Continue with Google";
					});
			});
		});
	</script>
</body>
